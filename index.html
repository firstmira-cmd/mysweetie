<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Choice Page</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #00247d, #ffffff, #cf142b);
      color: #111;
      text-align: center;
    }

    .container {
      background: rgba(255,255,255,0.9);
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }

    button {
      display: block;
      width: 100%;
      margin: 15px 0;
      padding: 15px;
      font-size: 16px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-weight: bold;
    }

    .btn1 {
      background: #00247d;
      color: white;
    }

    .btn2 {
      background: #cf142b;
      color: white;
    }

    #result {
      margin-top: 20px;
      font-size: 18px;
      font-weight: bold;
    }
  </style>
</head>
<body>

<div class="container">
  <h2>Make your choice</h2>
  <p><strong>Do you want to see Master's LinkedIn profile?</strong></p>

  <div id="buttons">
    <button class="btn1" onclick="goodChoice()">I choose to trust master</button>
    <button class="btn2" onclick="badChoice()">I can't wait</button>
  </div>

  <div id="result"></div>
  <div id="codeBox" style="display:none; margin-top:20px;">
    <input id="codeInput" type="password" placeholder="Enter code" style="padding:12px; font-size:16px; border-radius:10px; border:1px solid #ccc; width:100%; max-width:260px;">
    <button onclick="checkCode()" style="margin-top:12px; background:#111; color:white;">Continue</button>
  </div>
</div>

<script>
  function hideButtons() {
    document.getElementById('buttons').style.display = 'none';
  }

  function goodChoice() {
    hideButtons();
    document.getElementById('result').innerText = "Thanks Sweetie, you did well. You are ready for next lvl.";
  }

  function badChoice() {
    hideButtons();
    document.getElementById('result').innerText = "";
    document.getElementById('codeBox').style.display = 'block';
  }

  function checkCode() {
    const code = document.getElementById('codeInput').value;
    if (code === 'notred') {
      document.getElementById('codeBox').style.display = 'none';
      document.getElementById('result').innerText = "You are a bad girl, you are not ready";
    } else {
      document.getElementById('result').innerText = "Wrong code. Try again.";
    }
  }

  function checkCode() {
    const code = document.getElementById('codeInput').value;
    if (code === 'notred') {
      document.getElementById('codeBox').style.display = 'none';
      document.getElementById('result').innerText = "You are a bad girl, you are not ready.";
    } else {
      document.getElementById('result').innerText = "Wrong code. Try again.";
    }
  }
</script>

</body>
</html>
